<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenthra | Crypto Presale</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/app.js"></script>
  <script defer src="js/web3.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- BACKGROUND EFFECT -->
  <canvas id="background-canvas"></canvas>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="container">
      <h1 class="hero-title">Uncage the Chain.</h1>
      <p class="hero-subtitle">Presale Begins July 15, 2025</p>

      <div class="countdown" id="countdown"></div>

      <div class="price-box">
        <p>Current Presale Price:</p>
        <h2 id="current-price">$0.0005</h2>
        <p class="next-phase">Next price: <span id="next-price">$0.0007</span></p>
      </div>

      <div class="cta-buttons">
        <button id="buy-now-btn">Buy Now</button>
        <button id="connect-wallet-btn">Connect Wallet</button>
      </div>
    </div>
  </section>
