<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zenthra</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      font-family: 'Orbitron', sans-serif;
      background: url('Zenthra.jpeg') no-repeat center center/cover;
      color: #dcd6f7;
      scroll-behavior: smooth;
      min-height: 100vh;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 15, 30, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      z-index: 9999;
      flex-wrap: wrap;
    }

    header h1 {
      color: #a56eff;
      font-size: 2rem;
      text-shadow: 0 0 10px #a56effaa;
      user-select: none;
    }

    /* Menüsáv */
    nav#navbar {
      display: flex;
      gap: 25px;
    }
    nav#navbar a {
      text-decoration: none;
      color: #dcd6f7;
      font-weight: 700;
      font-size: 1rem;
      padding: 8px 12px;
      border-radius: 5px;
      transition: background 0.3s, color 0.3s;
      user-select: none;
    }
    nav#navbar a:hover,
    nav#navbar a:focus {
      background: #a56eff;
      color: #000;
      outline: none;
      box-shadow: 0 0 10px #a56effcc;
    }

    /* Gyorsgombok a header jobb oldalán */
    .header-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
      margin-left: 20px;
    }

    .header-buttons a,
    .header-buttons button {
      background: #a56eff;
      color: #000;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 10px #a56effaa;
      user-select: none;
      transition: background 0.3s ease;
      white-space: nowrap;
    }
    .header-buttons a:hover,
    .header-buttons button:hover {
      background: #c4a7e7;
    }
    /* Elválasztó vonal a gyorsgombok csoportjai között */
    .header-buttons .separator {
      width: 1px;
      height: 28px;
      background: #7a4bff;
      margin: 0 10px;
    }

    /* Hamburger ikon */
    .menu-toggle {
      display: none;
      font-size: 2.3rem;
      color: #a56eff;
      cursor: pointer;
      user-select: none;
    }

    /* Sections általános */
    section {
      padding: 140px 20px 80px;
      max-width: 960px;
      margin: 0 auto 60px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 12px;
      box-shadow: 0 0 30px #6e4ebbaa;
    }

    h2 {
      color: #a56eff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.2rem;
      user-select: none;
    }

    .story-block {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px 25px;
      margin-bottom: 25px;
      border-radius: 8px;
      box-shadow: 0 0 15px #6e4ebbaa;
      line-height: 1.5;
      font-size: 1.1rem;
      user-select: text;
      white-space: pre-line;
    }

    /* Hero szekció */
    #hero {
      text-align: center;
      padding-top: 160px;
      margin-bottom: 50px;
    }
    #countdown {
      font-size: 5rem;
      color: #c4a7e7;
      text-shadow: 0 0 20px #c4a7e7cc;
      margin-bottom: 20px;
      user-select: none;
    }
    #countdown-text {
      font-size: 1.3rem;
      margin-bottom: 40px;
      font-weight: 600;
      user-select: none;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    button {
      background: #a56eff;
      color: #000;
      border: none;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 0 15px #a56effaa;
      transition: background 0.3s ease;
      user-select: none;
    }
    button:hover:not(:disabled) {
      background: #c4a7e7;
    }
    button:disabled {
      background: #4a3e6f;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Tokenomics szekció */
    #tokenomics canvas {
      background: rgba(20,20,35,0.9);
      padding: 25px;
      border-radius: 12px;
      max-width: 100%;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      margin-top: 25px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      background: #2a2736;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: 700;
      box-shadow: 0 0 10px #1a1a2eaa;
      user-select: none;
      font-size: 0.95rem;
    }
    .color-box {
      width: 22px;
      height: 22px;
      margin-right: 12px;
      border-radius: 4px;
    }

    /* Responsive - Mobil */
    @media (max-width: 768px) {
      header {
        padding: 12px 20px;
        justify-content: space-between;
      }
      .menu-toggle {
        display: block;
      }
      nav#navbar {
        flex-direction: column;
        width: 100%;
        background: rgba(15, 15, 30, 0.95);
        margin-top: 10px;
        display: none;
      }
      nav#navbar.active {
        display: flex;
      }
      nav#navbar a {
        margin: 12px 0;
        font-size: 1.2rem;
        padding: 14px 20px;
      }
      .header-buttons {
        margin-left: 0;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: 100%;
        margin-top: 10px;
      }
      .header-buttons .separator {
        display: none;
      }
      section {
        padding: 130px 15px 60px;
        margin-bottom: 40px;
      }
      #countdown {
        font-size: 3.8rem;
      }
      .buttons {
        flex-direction: column;
        gap: 16px;
      }
      button {
        width: 100%;
        max-width: 320px;
      }
    }

  </style>
</head>
<body>
  <div class="animated-smoke-background"></div>

  <header>
    <h1>Zenthra</h1>
    <div class="menu-toggle" id="menu-toggle" aria-label="Menü megnyitása" role="button" tabindex="0">&#9776;</div>

    <nav id="navbar" role="navigation" aria-label="Fő navigáció">
      <a href="#about">About</a>
      <a href="#roadmap">Roadmap</a>
      <a href="#tokenomics">Tokenomics</a>
      <a href="#howto">How to Buy</a>
      <a href="#faq">FAQ</a>
    </nav>

    <div class="header-buttons" role="region" aria-label="Gyorsgombok">
      <!-- Közösségi gombok -->
      <a href="https://t.me/yourtelegram" target="_blank" rel="noopener noreferrer" aria-label="Telegram">Telegram</
