<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zenthra</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body,
    html {
      font-family: 'Orbitron', sans-serif;
      background: url('Zenthra.jpeg') no-repeat center center/cover;
      color: #dcd6f7;
      scroll-behavior: smooth;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 15, 30, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      z-index: 1000;
    }
    header h1 {
      color: #a56eff;
      font-size: 2rem;
      text-shadow: 0 0 10px #a56effaa;
    }
    nav {
      display: flex;
      gap: 25px;
    }
    nav a {
      text-decoration: none;
      color: #dcd6f7;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: #a56eff;
    }

    /* Hamburger Styles */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      width: 28px;
      height: 22px;
      justify-content: space-between;
    }
    .hamburger div {
      height: 3px;
      background-color: #a56eff;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    /* Hamburger active animation */
    .hamburger.active div:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    .hamburger.active div:nth-child(2) {
      opacity: 0;
    }
    .hamburger.active div:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }

    /* Mobile menu */
    .mobile-menu {
      position: fixed;
      top: 70px;
      right: 0;
      background: rgba(15, 15, 30, 0.95);
      width: 220px;
      height: calc(100vh - 70px);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 20px;
      z-index: 999;
      box-shadow: -4px 0 15px #a56eff55;
      border-radius: 8px 0 0 8px;
    }
    .mobile-menu.active {
      transform: translateX(0);
    }
    .mobile-menu a {
      color: #dcd6f7;
      font-weight: 700;
      text-decoration: none;
      padding: 12px 0;
      border-bottom: 1px solid #a56eff33;
      transition: color 0.25s ease;
    }
    .mobile-menu a:hover {
      color: #a56eff;
    }
    .mobile-menu .social-icons {
      margin-top: auto;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding-top: 15px;
      border-top: 1px solid #a56eff33;
    }
    .mobile-menu .social-icons a img {
      width: 28px;
      height: 28px;
    }

    /* Hide desktop nav on small */
    @media (max-width: 768px) {
      nav {
        display: none;
      }
      .hamburger {
        display: flex;
      }
    }

    section {
      padding: 140px 20px 80px;
      max-width: 960px;
      margin: auto;
    }
    #hero {
      text-align: center;
    }
    .hero-box {
      background: rgba(30, 20, 50, 0.75);
      border: 2px solid #a56eff55;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px #a56eff66;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      margin: 0 auto 20px;
    }
    #countdown {
      font-size: 4rem;
      color: #c4a7e7;
      text-shadow: 0 0 20px #c4a7e7cc;
      margin-bottom: 10px;
    }
    #countdown-text {
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .action-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #a56eff;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 10px #a56effaa;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background: #c4a7e7;
    }
    .icon-button {
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .icon-button img {
      width: 28px;
      height: 28px;
    }
    .community {
      margin-top: 20px;
    }
    .social-icons {
      margin-top: 10px;
      display: none;
      gap: 10px;
      justify-content: center;
    }
    .social-icons.active {
      display: flex;
    }
    h2 {
      color: #a56eff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .story-block {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 6px;
      box-shadow: 0 0 15px #6e4ebbaa;
    }
    #tokenomics canvas {
      background: rgba(20, 20, 35, 0.8);
      padding: 10px;
      border-radius: 8px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      background: #2a2736;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 0 10px #1a1a2eaa;
    }
    .color-box {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      border-radius: 3px;
    }
    footer {
      text-align: center;
      padding: 30px 10px;
      color: #777;
      font-size: 0.9rem;
    }
    footer a {
      color: #a56eff;
      margin: 0 10px;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    @media (max-width: 768px) {
      header {
        flex-direction: row;
        justify-content: space-between;
      }
      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
