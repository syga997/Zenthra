<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zenthra</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      font-family: 'Orbitron', sans-serif;
      background: url('Zenthra.jpeg') no-repeat center center/cover;
      color: #dcd6f7;
      scroll-behavior: smooth;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 15, 30, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      z-index: 10;
    }
    header h1 {
      color: #a56eff;
      font-size: 2rem;
      text-shadow: 0 0 10px #a56effaa;
    }
    nav {
      display: flex;
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #dcd6f7;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: #a56eff;
    }
    .menu-toggle {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }
    .menu-toggle span {
      height: 3px;
      width: 25px;
      background: #dcd6f7;
      margin: 4px 0;
      border-radius: 2px;
    }
    @media (max-width: 768px) {
      .menu-toggle {
        display: flex;
      }
      nav {
        display: none;
        flex-direction: column;
        background: rgba(15, 15, 30, 0.95);
        position: absolute;
        top: 70px;
        right: 20px;
        padding: 10px 20px;
        border-radius: 8px;
        box-shadow: 0 0 15px #000;
      }
      nav.active {
        display: flex;
      }
      nav a {
        margin: 10px 0;
      }
      header {
        flex-direction: row;
      }
    }
    section {
      padding: 140px 20px 80px;
      max-width: 960px;
      margin: auto;
    }
    #hero {
      text-align: center;
    }
    .hero-box {
      background: rgba(30, 20, 50, 0.75);
      border: 2px solid #a56eff55;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 0 20px #a56eff66;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      margin: 0 auto 20px;
    }
    #countdown {
      font-size: 4rem;
      color: #c4a7e7;
      text-shadow: 0 0 20px #c4a7e7cc;
      margin-bottom: 10px;
    }
    #countdown-text {
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .action-buttons {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #a56eff;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 10px #a56effaa;
    }
    button:hover {
      background: #c4a7e7;
    }
    .icon-button {
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .icon-button img {
      width: 28px;
      height: 28px;
    }
    .community {
      margin-top: 20px;
    }
    .social-icons {
      margin-top: 10px;
      display: none;
      gap: 10px;
      justify-content: center;
    }
    .social-icons.active {
      display: flex;
    }
    h2 {
      color: #a56eff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .story-block {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 6px;
      box-shadow: 0 0 15px #6e4ebbaa;
    }
    #tokenomics canvas {
      background: rgba(20,20,35,0.8);
      padding: 10px;
      border-radius: 8px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      background: #2a2736;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 0 10px #1a1a2eaa;
    }
    .color-box {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      border-radius: 3px;
    }
    footer {
      text-align: center;
      padding: 30px 10px;
      color: #777;
      font-size: 0.9rem;
    }
    footer a {
      color: #a56eff;
      margin: 0 10px;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Zenthra</h1>
    <div class="menu-toggle" id="menuToggle">
      <span></span><span></span><span></span>
    </div>
    <nav id="navMenu">
      <a href="#about">Behind the Mask</a>
      <a href="#roadmap">Roadmap</a>
      <a href="#tokenomics">Tokenomics</a>
      <a href="#howto">How to Buy</a>
    </nav>
  </header>
  <!-- ... page content remains unchanged ... -->
  <script>
    // ... existing JS code ...
    document.getElementById("menuToggle").addEventListener("click", function() {
      document.getElementById("navMenu").classList.toggle("active");
    });
  </script>
</body>
</html>
