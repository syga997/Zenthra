<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zenthra</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body,
    html {
      font-family: 'Orbitron', sans-serif;
      background: url('Zenthra.jpeg') no-repeat center center/cover;
      color: #dcd6f7;
      scroll-behavior: smooth;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 15, 30, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      z-index: 10;
      flex-wrap: wrap;
    }
    header h1 {
      color: #a56eff;
      font-size: 2rem;
      text-shadow: 0 0 10px #a56effaa;
      flex-shrink: 0;
    }
    nav {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      flex-grow: 1;
      justify-content: center;
    }
    nav a {
      text-decoration: none;
      color: #dcd6f7;
      font-weight: bold;
      transition: color 0.3s ease;
      font-size: 1rem;
      white-space: nowrap;
    }
    nav a:hover {
      color: #a56eff;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-right button {
      background: #a56eff;
      color: #000;
      border: none;
      padding: 8px 14px;
      font-size: 0.9rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 10px #a56effaa;
      transition: background-color 0.3s ease;
    }
    .header-right button:hover {
      background: #c4a7e7;
    }
    .icon-link {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #dcd6f7;
      transition: color 0.3s ease;
      text-decoration: none;
    }
    .icon-link:hover {
      color: #a56eff;
    }
    /* Telegram icon SVG */
    .icon-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    section {
      padding: 140px 20px 80px;
      max-width: 960px;
      margin: auto;
    }
    #hero {
      text-align: center;
    }
    #countdown {
      font-size: 5rem;
      color: #c4a7e7;
      text-shadow: 0 0 20px #c4a7e7cc;
      margin-bottom: 20px;
    }
    #countdown-text {
      font-size: 1.2rem;
      margin-bottom: 40px;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    button {
      background: #a56eff;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 0 10px #a56effaa;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background: #c4a7e7;
    }
    h2 {
      color: #a56eff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .story-block {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 6px;
      box-shadow: 0 0 15px #6e4ebbaa;
      white-space: pre-line;
    }
    #tokenomics canvas {
      background: rgba(20, 20, 35, 0.8);
      padding: 10px;
      border-radius: 8px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      background: #2a2736;
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 0 10px #1a1a2eaa;
      white-space: nowrap;
    }
    .color-box {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      border-radius: 3px;
    }
    /* Placeholder FAQ section */
    #faq {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 6px;
      margin-top: 40px;
      font-size: 1.1rem;
      text-align: center;
      box-shadow: 0 0 15px #6e4ebbaa;
    }
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: center;
      }
      nav {
        margin: 10px 0;
        justify-content: center;
        gap: 12px;
      }
      #countdown {
        font-size: 3rem;
      }
      .buttons {
        flex-direction: column;
        align-items: center;
      }
      .header-right {
        margin-top: 10px;
      }
    }
  </style>
</head>
