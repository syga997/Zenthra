<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zenthra</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="background.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      font-family: 'Orbitron', sans-serif;
      background: url('Zenthra.jpeg') no-repeat center center/cover;
      color: #dcd6f7;
      scroll-behavior: smooth;
    }
    .animated-smoke-background {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at center, rgba(30,30,50,0.3) 0%, rgba(10,10,20,0.9) 100%);
      animation: smokeMotion 40s ease-in-out infinite;
      background-blend-mode: overlay;
      opacity: 0.5;
    }
    @keyframes smokeMotion {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(15, 15, 30, 0.9);
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      z-index: 10;
    }
    h1.glitch {
      position: relative;
      color: #a56eff;
      text-shadow: 0 0 10px #a56effaa;
      animation: glitch 1s infinite;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(-1px, -2px); }
      60% { transform: translate(2px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0); }
    }
    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #dcd6f7;
      font-weight: bold;
      transition: color 0.3s ease;
    }
    nav a:hover {
      color: #a56eff;
      filter: drop-shadow(0 0 5px #a56effaa);
    }
  </style>
</head>
<body>
  <div class="animated-smoke-background"></div>
  <header>
    <h1 class="glitch">Zenthra</h1>
    <nav>
      <a href="#story">Story</a>
      <a href="#tokenomics">Tokenomics</a>
      <a href="#buy">Buy</a>
    </nav>
  </header>

  <!-- Additional sections such as story, tokenomics, Cyberveil effect, and more can be added here -->

  <script>
    // Cyberveil transition setup
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          document.body.style.backdropFilter = 'blur(8px)';
          entry.target.style.transition = 'opacity 1.5s ease';
          entry.target.style.opacity = '1';
        } else {
          document.body.style.backdropFilter = 'blur(0px)';
          entry.target.style.opacity = '0';
        }
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.story-section').forEach(section => {
      observer.observe(section);
    });

    // Chart.js hover plugin for dynamic glow on legend
    Chart.plugins.register({
      beforeEvent: function(chart, event) {
        const legends = chart.legend.legendItems;
        if (event.type === 'mousemove') {
          legends.forEach((legend, i) => {
            const meta = chart.getDatasetMeta(i);
            meta.controller.getMeta().data.forEach(pt => {
              pt.custom = pt.custom || {};
              pt.custom.radius = pt.inRange(event.x, event.y) ? 10 : undefined;
            });
          });
        }
      }
    });
  </script>
</body>
</html>
