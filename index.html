<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenthra</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    section {
      padding: 50px;
      text-align: center;
    }
    canvas {
      background: white;
      border-radius: 10px;
      max-width: 600px;
      margin: 0 auto 20px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .legend div {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .legend .color-box {
      width: 15px;
      height: 15px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <!-- Other sections remain unchanged -->

  <section id="tokenomics">
    <h2>Tokenomics</h2>
    <canvas id="tokenomicsChart"></canvas>
    <div id="tokenomicsLegend" class="legend"></div>
  </section>

  <script>
    const ctx = document.getElementById('tokenomicsChart').getContext('2d');
    const data = {
      labels: [
        'Presale',
        'Liquidity',
        'Marketing/Growth',
        'Development',
        'Team (locked)',
        'Community Fund'
      ],
      datasets: [{
        label: 'Token Distribution',
        data: [33000000000, 37500000000, 28500000000, 24000000000, 15000000000, 12000000000],
        backgroundColor: [
          '#FF6384',
          '#36A2EB',
          '#FFCE56',
          '#4BC0C0',
          '#9966FF',
          '#FF9F40'
        ]
      }]
    };

    const config = {
      type: 'doughnut',
      data: data,
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                const value = context.raw.toLocaleString();
                return `${context.label}: ${value}`;
              }
            }
          }
        }
      }
    };

    const tokenomicsChart = new Chart(ctx, config);

    // Generate legend manually
    const legendContainer = document.getElementById('tokenomicsLegend');
    data.labels.forEach((label, i) => {
      const div = document.createElement('div');
      div.innerHTML = `<span class="color-box" style="background:${data.datasets[0].backgroundColor[i]}"></span>${label}`;
      legendContainer.appendChild(div);
    });
  </script>

</body>
</html>
